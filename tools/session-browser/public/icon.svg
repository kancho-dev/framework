<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 22 88 84" role="img" aria-label="Session Browser logo">
  <defs>
    <linearGradient id="accent" x1="36" y1="26" x2="98" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9cdcfe"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <!-- local archive window -->
  <rect x="24" y="26" width="80" height="76" rx="14" fill="#1d1f27" stroke="#353948" stroke-width="3" filter="url(#softShadow)"/>
  <path d="M24 44h80" stroke="#353948" stroke-width="3"/>
  <circle cx="38" cy="35" r="3" fill="#ff7b72"/>
  <circle cx="50" cy="35" r="3" fill="#f2cc60"/>
  <circle cx="62" cy="35" r="3" fill="#7ee787"/>

  <!-- session timeline -->
  <path d="M46 58v28" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="46" cy="58" r="6" fill="#15161b" stroke="#9cdcfe" stroke-width="4"/>
  <circle cx="46" cy="86" r="6" fill="#15161b" stroke="#7ee787" stroke-width="4"/>

  <!-- transcript cards -->
  <path d="M60 55h23c4 0 7 3 7 7s-3 7-7 7H60z" fill="#263140" stroke="#9cdcfe" stroke-width="3" stroke-linejoin="round"/>
  <path d="M60 78h31c4 0 7 3 7 7s-3 7-7 7H60z" fill="#182420" stroke="#7ee787" stroke-width="3" stroke-linejoin="round"/>

  <!-- restore/branch cue -->
  <path d="M77 69c0 9-8 10-8 17" fill="none" stroke="#f2cc60" stroke-width="4" stroke-linecap="round"/>
  <path d="M69 86l-5-5m5 5l5-5" fill="none" stroke="#f2cc60" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
